<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APS Developer - Scanner Oficial</title>
    <style>
        body {
            background-color: #000;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 90vh;
            margin: 0;
            cursor: pointer;
        }
        .contenedor {
            text-align: center;
            background: #111;
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #007bff;
            width: 350px;
            box-shadow: 0 0 20px rgba(0, 123, 255, 0.2);
        }
        h1 { font-size: 2rem; color: #007bff; margin-bottom: 5px; }
        .subtitulo { font-size: 0.9rem; color: #555; margin-bottom: 25px; letter-spacing: 1px; }
        input[type="number"] {
            padding: 15px; width: 80%; border-radius: 10px; border: none;
            font-size: 1.5rem; margin-bottom: 20px; text-align: center;
            background: #222; color: #fff;
        }
        button {
            background-color: #007bff; color: #fff; border: none;
            padding: 15px 30px; font-size: 1.1rem; font-weight: bold;
            border-radius: 10px; cursor: pointer;
        }
        #mensaje { font-size: 1.1rem; margin-top: 20px; font-weight: bold; }
        .meme { width: 250px; border-radius: 10px; display: none; margin: 20px auto; }
    </style>
</head>
<body>
    <div class="contenedor">
        <h1>APS Developer</h1>
        <div class="subtitulo">SISTEMA DE ESCANEO BIOMÉTRICO</div>
        <p>Ingrese peso para validación (kg)</p>
        <input type="number" id="inputPeso" placeholder="00">
        <br>
        <button onclick="ejecutarReto()">INICIAR ESCANEO</button>
        <div id="resultado">
            <h2 id="mensaje"></h2>
            <img id="imagenMeme" class="meme" src="">
        </div>
    </div>

    <script>
        function ejecutarReto() {
            const peso = document.getElementById('inputPeso').value;
            const mensaje = document.getElementById('mensaje');
            const imagen = document.getElementById('imagenMeme');

            if (peso === "") return alert("Ingresa el peso rata");

            imagen.style.display = "block";

            if (parseFloat(peso) > 100) {
                mensaje.innerText = "¡SOS UN TERMOTANQUE, ADELGAZA";
                mensaje.style.color = "#ff4444";
                imagen.src = "image-removebg-preview.png";
                let audio = new Audio('oye-gela-escuchate-esto-saturado.mp3');
                audio.play();
            } else {
                mensaje.innerText = "mmmmmmmm";
                mensaje.style.color = "#44ff44";
                imagen.src = "https://media.giphy.com/media/l0HlBO7eyWzSZkJri/giphy.gif";
            }
        }
    </script>
</body>
</html>
